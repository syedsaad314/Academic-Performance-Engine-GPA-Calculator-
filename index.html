<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACADEMIC PERFORMANCE ENGINE</title>
    <style>
        :root {
            --bg: #0D0D0D;
            --surface: #161616;
            --amber: #FFB300;
            --text: #F5F5F5;
            --text-dim: #888888;
            --border: #2A2A2A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

        /* Navigation & Socials */
        .header-nav { position: fixed; top: 0; width: 100%; padding: 15px 30px; display: flex; justify-content: flex-end; gap: 20px; z-index: 1000; }
        .header-nav svg { width: 22px; height: 22px; fill: var(--text-dim); transition: 0.3s; }
        .header-nav a:hover svg { fill: var(--amber); }

        header { text-align: center; padding: 5rem 1rem 2rem; }
        .logo-box { width: 60px; height: 60px; border: 2px solid var(--amber); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; }
        h1 { font-size: 1.8rem; font-weight: 900; letter-spacing: 1px; color: var(--text); }
        .tagline { color: var(--amber); font-size: 0.75rem; letter-spacing: 4px; margin-top: 5px; font-weight: 600; }

        /* Container System */
        .container { width: 95%; max-width: 750px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; margin-bottom: 3rem; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .step-title { font-size: 1.3rem; margin-bottom: 1.5rem; text-align: center; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: var(--text-dim); font-size: 0.8rem; margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #0A0A0A; border: 1px solid var(--border); border-radius: 8px; color: white; outline: none; }
        input:focus { border-color: var(--amber); }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { padding: 1rem; border-radius: 8px; border: 1px solid var(--border); background: #1F1F1F; color: white; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:hover { border-color: var(--amber); color: var(--amber); }
        
        .action-btns { display: flex; gap: 10px; margin-top: 25px; }
        .btn-back { flex: 0.4; background: transparent; border: 1px solid var(--border); }
        .btn-next { flex: 1; background: var(--amber); color: black; border: none; font-weight: 800; }
        .btn-next:hover { background: #FFC107; }

        /* Entry Rows */
        .data-header { display: grid; grid-template-columns: 40px 1.5fr 1fr 1fr; gap: 10px; padding: 10px; color: var(--text-dim); font-size: 0.7rem; }
        .data-row { display: grid; grid-template-columns: 40px 1.5fr 1fr 1fr; gap: 10px; margin-bottom: 8px; }
        .data-row input { padding: 8px; font-size: 0.9rem; }

        /* Formal Report View */
        .transcript { border: 2px solid var(--amber); padding: 40px; background: #111; }
        .uni-header { text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
        .uni-name { font-size: 2rem; font-weight: 900; text-transform: uppercase; }
        .sem-info { color: var(--amber); font-weight: 700; letter-spacing: 2px; }

        .gpa-display { font-size: 6rem; font-weight: 900; color: var(--amber); text-align: center; margin: 20px 0; }
        .rating { text-align: center; font-size: 1.2rem; font-weight: 700; margin-bottom: 30px; border: 1px solid var(--amber); display: inline-block; padding: 10px 20px; border-radius: 4px; width: 100%; background: rgba(255, 179, 0, 0.05); }

        .report-table { width: 100%; border-collapse: collapse; margin-bottom: 40px; }
        .report-table th { text-align: left; border-bottom: 2px solid var(--border); padding: 10px; color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; }
        .report-table td { padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 0.95rem; }

        .signature-area { display: flex; justify-content: space-between; align-items: flex-end; border-top: 1px solid var(--border); padding-top: 20px; }
        .sig-block p { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 5px; letter-spacing: 1px; }
        .sig-block strong { font-size: 1.1rem; color: var(--text); }

        .hidden { display: none; }

        /* PDF Printing Logic */
        @media print {
            body { background: white; color: black; padding: 0; }
            .header-nav, header, .action-btns, .btn-back, .btn-next, .btn-grid, .btn-download, .nav-footer { display: none !important; }
            .container { border: none; box-shadow: none; width: 100%; max-width: 100%; margin: 0; padding: 0; }
            .transcript { border: 1px solid #000; color: black; background: white; }
            .gpa-display, .rating, .sem-info { color: black !important; }
            .report-table th, .report-table td { border-bottom: 1px solid #ddd; color: black; }
            .sig-block strong { color: black !important; }
        }
    </style>
</head>
<body>

    <nav class="header-nav">
        <a href="https://github.com/syedsaad314" target="_blank" title="GitHub">
            <svg viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.041-1.416-4.041-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        </a>
        <a href="https://linkedin.com/in/syed-saad-bin-irfan" target="_blank" title="LinkedIn">
            <svg viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
        </a>
    </nav>

    <header>
        <div class="logo-box">
            <svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 30H40M30 20V40" stroke="white" stroke-width="8" stroke-linecap="round"/><path d="M60 30H80" stroke="white" stroke-width="8" stroke-linecap="round"/><path d="M22 78L38 62M22 62L38 78" stroke="#FFB300" stroke-width="8" stroke-linecap="round"/><circle cx="70" cy="62" r="5" fill="#FFB300"/><circle cx="70" cy="78" r="5" fill="#FFB300"/><path d="M60 70H80" stroke="#FFB300" stroke-width="4" stroke-linecap="round"/>
            </svg>
        </div>
        <h1>ACADEMIC PERFORMANCE ENGINE</h1>
        <div class="tagline">PRECISION ANALYTICS</div>
    </header>

    <div class="container" id="step1">
        <h2 class="step-title">Authentication</h2>
        <div class="input-group"><label>Institute Name</label><input type="text" id="uni" placeholder="e.g. University of Karachi"></div>
        <div class="input-group"><label>Semester / Session</label><input type="text" id="sem" placeholder="e.g. BSSE Semester 4"></div>
        <button class="btn-next" style="width:100%" onclick="next(1,2)">Continue</button>
    </div>

    <div class="container hidden" id="step2">
        <h2 class="step-title">Select Mode</h2>
        <div class="btn-grid">
            <button onclick="config.type='gpa'; next(2,3)">GPA Calculation</button>
            <button onclick="config.type='cgpa'; next(2,3)">CGPA Calculation</button>
        </div>
        <button class="btn-back" style="width:100%; margin-top:10px;" onclick="back(2,1)">Back</button>
    </div>

    <div class="container hidden" id="step3">
        <h2 class="step-title">Report Depth</h2>
        <div class="btn-grid">
            <button onclick="config.detailed=true; next(3,4)">Detailed Transcript</button>
            <button onclick="config.detailed=false; next(3,4)">Quick Report</button>
        </div>
        <button class="btn-back" style="width:100%; margin-top:10px;" onclick="back(3,2)">Back</button>
    </div>

    <div class="container hidden" id="step4">
        <h2 class="step-title">Subject Count</h2>
        <div class="input-group" style="text-align:center;"><input type="number" id="qty" value="5" min="1" max="15" style="width:80px; font-size:1.5rem;"></div>
        <div class="action-btns">
            <button class="btn-back" onclick="back(4,3)">Back</button>
            <button class="btn-next" onclick="initRows()">Generate Rows</button>
        </div>
    </div>

    <div class="container hidden" id="step5">
        <h2 class="step-title">Data Ingestion</h2>
        <div class="data-header"><div>#</div><div>Subject Name</div><div>Score</div><div>Credits</div></div>
        <div id="entryContainer"></div>
        <div class="action-btns">
            <button class="btn-back" onclick="back(5,4)">Back</button>
            <button class="btn-next" onclick="generateReport()">Generate Final Report</button>
        </div>
    </div>

    <div class="container transcript hidden" id="step6">
        <div class="uni-header">
            <div class="uni-name" id="outUni">UNIVERSITY</div>
            <div class="sem-info" id="outSem">SESSION</div>
        </div>
        
        <p style="text-align:center; color:var(--text-dim); font-size:0.7rem; letter-spacing:2px;">CUMULATIVE RESULT</p>
        <div class="gpa-display" id="outGpa">0.00</div>
        <div class="rating" id="outRate">RATING</div>

        <table class="report-table" id="outTable">
            <thead><tr><th>Subject</th><th>Score</th><th>Credits</th></tr></thead>
            <tbody id="outBody"></tbody>
        </table>

        <div class="signature-area">
            <div class="sig-block">
                <p>CERTIFIED BY</p>
                <strong>SYED SAAD BIN IRFAN</strong>
            </div>
            <div style="text-align:right; color:var(--text-dim); font-size:0.6rem;">
                REF: BSSE-AUDIT-2026<br>DATE: <span id="outDate"></span>
            </div>
        </div>
        
        <div class="action-btns" style="margin-top:40px;">
            <button class="btn-next" onclick="window.print()">Print to PDF</button>
            <button class="btn-next" style="background:#333; color:white;" onclick="saveToFile()">Save Report (.txt)</button>
        </div>
        <button class="btn-back" style="width:100%; margin-top:10px;" onclick="location.reload()">New Calculation</button>
    </div>

    <script>
        let config = { type: '', detailed: false, count: 0 };
        const next = (h, s) => { document.getElementById(`step${h}`).classList.add('hidden'); document.getElementById(`step${s}`).classList.remove('hidden'); };
        const back = (h, b) => { document.getElementById(`step${h}`).classList.add('hidden'); document.getElementById(`step${b}`).classList.remove('hidden'); };

        function initRows() {
            config.count = document.getElementById('qty').value;
            const container = document.getElementById('entryContainer');
            container.innerHTML = '';
            for(let i=1; i<=config.count; i++) {
                const row = document.createElement('div'); row.className = 'data-row';
                row.innerHTML = `<div style="color:var(--amber); font-weight:bold; text-align:center;">${i}</div>
                    <input type="text" id="n_${i}" placeholder="Subject ${i}" ${config.detailed ? '' : 'disabled'}>
                    <input type="number" id="s_${i}" placeholder="${config.type==='gpa'?'Marks':'GPA'}">
                    <input type="number" id="c_${i}" value="3">`;
                container.appendChild(row);
            }
            next(4,5);
        }

        function generateReport() {
            let twp = 0, tc = 0;
            const body = document.getElementById('outBody');
            body.innerHTML = '';
            const getGP = (m) => m>=85?4:m>=80?3.8:m>=75?3.4:m>=71?3:m>=68?2.8:m>=64?2.4:m>=61?2:m>=57?1.8:m>=53?1.4:m>=50?1:0;
            const getRate = (v) => v>=3.8?"🎓 ELITE PERFORMANCE":v>=3.4?"🌟 OUTSTANDING":v>=3.0?"✨ PROFICIENT":"⚠️ NEEDS IMPROVEMENT";

            for(let i=1; i<=config.count; i++) {
                const n = document.getElementById(`n_${i}`).value || `Subject ${i}`;
                const s = parseFloat(document.getElementById(`s_${i}`).value) || 0;
                const c = parseFloat(document.getElementById(`c_${i}`).value) || 0;
                const gp = config.type==='gpa' ? getGP(s) : s;
                twp += (gp * c); tc += c;
                if(config.detailed) body.insertAdjacentHTML('beforeend', `<tr><td>${n}</td><td>${s}</td><td>${c}</td></tr>`);
            }

            const final = tc > 0 ? (twp/tc).toFixed(2) : "0.00";
            document.getElementById('outUni').innerText = document.getElementById('uni').value || "INSTITUTION NAME";
            document.getElementById('outSem').innerText = document.getElementById('sem').value || "ACADEMIC SESSION";
            document.getElementById('outGpa').innerText = final;
            document.getElementById('outRate').innerText = getRate(parseFloat(final));
            document.getElementById('outDate').innerText = new Date().toLocaleDateString();
            if(!config.detailed) document.getElementById('outTable').classList.add('hidden');
            next(5,6);
        }

        function saveToFile() {
            const uni = document.getElementById('outUni').innerText;
            const sem = document.getElementById('outSem').innerText;
            const gpa = document.getElementById('outGpa').innerText;
            const rate = document.getElementById('outRate').innerText;
            const date = document.getElementById('outDate').innerText;
            
            let content = `ACADEMIC PERFORMANCE REPORT\n---------------------------\n`;
            content += `INSTITUTE: ${uni}\nSESSION: ${sem}\nDATE: ${date}\n\n`;
            content += `FINAL RESULT: ${gpa}\nSTATUS: ${rate}\n\n`;
            content += `VERIFIED BY: SYED SAAD BIN IRFAN\n---------------------------`;

            const blob = new Blob([content], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Report_${uni.replace(/\s+/g, '_')}.txt`;
            link.click();
        }
    </script>
</body>
</html>
